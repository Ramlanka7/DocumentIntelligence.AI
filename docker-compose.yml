name: ai-document-intelligence

# ---------------------------------------------------------------------------
# Local development stack.  All services read config from a .env file
# (copy .env.example → .env once, then fill in your values).
#
# Start everything:   docker compose up -d
# Run migrations:     docker compose --profile migrate run --rm migrate
# Tear down:          docker compose down [-v]
# ---------------------------------------------------------------------------

services:
  # ---- PostgreSQL + pgvector -----------------------------------------------
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-document_intelligence}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-document_intelligence}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Azurite (Azure Storage emulator) ------------------------------------
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:3.33.0
    restart: unless-stopped
    command:
      - azurite
      - --blobHost
      - "0.0.0.0"
      - --queueHost
      - "0.0.0.0"
      - --tableHost
      - "0.0.0.0"
      - --location
      - /data
      - --skipApiVersionCheck
    ports:
      - "${AZURITE_BLOB_PORT:-10000}:10000"
      - "${AZURITE_QUEUE_PORT:-10001}:10001"
      - "${AZURITE_TABLE_PORT:-10002}:10002"
    volumes:
      - azurite-data:/data

  # ---------------------------------------------------------------------------
  # Azure AI Search has no official local container/emulator — it is a managed
  # Azure cloud service.
  #
  # LOCAL FALLBACK (active when AzureSearch__Endpoint is blank):
  #   PgVectorSearchService (in AI.DocumentIntelligence.Persistence/Search/) is
  #   registered automatically as ISearchService. It stores and retrieves chunks
  #   against the postgres service above using pgvector's <=> cosine operator and
  #   the HNSW index created by the InitialCreate migration.
  #
  #   To activate Azure AI Search instead: set AzureSearch__Endpoint and
  #   AzureSearch__ApiKey in your .env file (or environment). No code change needed.
  # ---------------------------------------------------------------------------
  # ai-search-stub:
  #   image: mcr.microsoft.com/azure-search/search-emulator:placeholder
  #   profiles: ["search-stub"]
  #   environment:
  #     AzureSearch__Endpoint: ${AzureSearch__Endpoint:-}
  #     AzureSearch__ApiKey: ${AzureSearch__ApiKey:-}
  #     AzureSearch__IndexName: ${AzureSearch__IndexName:-document-chunks}

  # ---- API -----------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      azurite:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_HTTP_PORTS: "8080"
      # Database
      ConnectionStrings__DefaultConnection: ${ConnectionStrings__DefaultConnection:-Host=postgres;Port=5432;Database=document_intelligence;Username=postgres;Password=postgres}
      # Local dev convenience: apply migrations and seed the initial admin on startup.
      # In production, run migrations as a separate step (CD pipeline / migrate profile)
      # and enable SeedOnStartup only with Seed__AdminPassword from a secret store.
      Database__AutoMigrate: ${Database__AutoMigrate:-true}
      Database__SeedOnStartup: ${Database__SeedOnStartup:-true}
      Seed__AdminEmail: ${Seed__AdminEmail:-admin@documentintelligence.local}
      Seed__AdminPassword: ${Seed__AdminPassword:-}
      # AzureStorage:* — read by AzureBlobFileStorage / BlobStorageOptions.
      # The Azurite dev connection string below wires the API to the local emulator container.
      # For production, replace with the real Azure Blob Storage connection string via secrets.
      AzureStorage__ConnectionString: ${AzureStorage__ConnectionString:-DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;}
      AzureStorage__ContainerName: ${AzureStorage__ContainerName:-documents}
      # JWT — MUST be set; never leave as default in any real environment.
      # Set Jwt__SecretKey in your .env file (see .env.example).
      Jwt__Issuer: ${Jwt__Issuer:-DocumentIntelligence}
      Jwt__Audience: ${Jwt__Audience:-DocumentIntelligenceClient}
      Jwt__SecretKey: ${Jwt__SecretKey:?Jwt__SecretKey is required — set it in .env}
      Jwt__AccessTokenExpiryMinutes: ${Jwt__AccessTokenExpiryMinutes:-15}
      Jwt__RefreshTokenExpiryDays: ${Jwt__RefreshTokenExpiryDays:-7}
      # Azure OpenAI (leave blank locally to use stub/Ollama AI provider)
      AzureOpenAI__Endpoint: ${AzureOpenAI__Endpoint:-}
      AzureOpenAI__ApiKey: ${AzureOpenAI__ApiKey:-}
      AzureOpenAI__ChatDeployment: ${AzureOpenAI__ChatDeployment:-gpt-4o}
      AzureOpenAI__EmbeddingDeployment: ${AzureOpenAI__EmbeddingDeployment:-text-embedding-3-small}
      AzureOpenAI__EmbeddingDimensions: ${AzureOpenAI__EmbeddingDimensions:-1536}
      # Azure AI Search (leave blank locally; pgvector fallback is used)
      AzureSearch__Endpoint: ${AzureSearch__Endpoint:-}
      AzureSearch__ApiKey: ${AzureSearch__ApiKey:-}
      AzureSearch__IndexName: ${AzureSearch__IndexName:-document-chunks}
      # Application Insights (optional)
      ApplicationInsights__ConnectionString: ${ApplicationInsights__ConnectionString:-}
    ports:
      - "${API_HTTP_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---- Frontend (nginx) ----------------------------------------------------
  frontend:
    build:
      context: ./ui/AI.DocumentIntelligence.UI
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${FRONTEND_HTTP_PORT:-4200}:8080"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---- EF Core migration runner (profile: migrate) -------------------------
  # Run with:  docker compose --profile migrate run --rm migrate
  #
  # This service uses the migrator build target in Dockerfile (SDK-based) and
  # runs dotnet ef database update against the postgres service.
  #
  # Until then the command exits 0 with "No migrations were applied."
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: ${ConnectionStrings__DefaultConnection:-Host=postgres;Port=5432;Database=document_intelligence;Username=postgres;Password=postgres}
      # Jwt__SecretKey is required by Program.cs at startup even for migrations.
      Jwt__SecretKey: ${Jwt__SecretKey:?Jwt__SecretKey is required — set it in .env}
      Jwt__Issuer: ${Jwt__Issuer:-DocumentIntelligence}
      Jwt__Audience: ${Jwt__Audience:-DocumentIntelligenceClient}
      AzureOpenAI__Endpoint: ${AzureOpenAI__Endpoint:-https://placeholder.openai.azure.com/}
      AzureOpenAI__ApiKey: ${AzureOpenAI__ApiKey:-placeholder}
      AzureSearch__Endpoint: ${AzureSearch__Endpoint:-https://placeholder.search.windows.net}
      AzureSearch__ApiKey: ${AzureSearch__ApiKey:-placeholder}
      ASPNETCORE_ENVIRONMENT: Development
    profiles:
      - migrate

volumes:
  postgres-data:
  azurite-data:
