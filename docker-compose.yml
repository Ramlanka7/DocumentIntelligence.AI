name: ai-document-intelligence

services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-document_intelligence}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-document_intelligence}"]
      interval: 10s
      timeout: 5s
      retries: 5

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:3.33.0
    restart: unless-stopped
    command: ["azurite", "--blobHost", "0.0.0.0", "--queueHost", "0.0.0.0", "--tableHost", "0.0.0.0", "--location", "/data", "--skipApiVersionCheck"]
    ports:
      - "${AZURITE_BLOB_PORT:-10000}:10000"
      - "${AZURITE_QUEUE_PORT:-10001}:10001"
      - "${AZURITE_TABLE_PORT:-10002}:10002"
    volumes:
      - azurite-data:/data

  # ---------------------------------------------------------------------------
  # Azure AI Search has no official local container/emulator — it is a managed
  # Azure cloud service.
  #
  # LOCAL FALLBACK (active when AzureSearch__Endpoint is blank):
  #   PgVectorSearchService (in AI.DocumentIntelligence.Persistence/Search/) is
  #   registered automatically as ISearchService. It stores and retrieves chunks
  #   against the postgres service above using pgvector's <=> cosine operator and
  #   the HNSW index created by the InitialCreate migration.
  #
  #   To activate Azure AI Search instead: set AzureSearch__Endpoint and
  #   AzureSearch__ApiKey in your .env file (or environment). No code change needed.
  # ---------------------------------------------------------------------------
  # ai-search-stub:
  #   image: mcr.microsoft.com/azure-search/search-emulator:placeholder
  #   profiles: ["search-stub"]
  #   environment:
  #     AzureSearch__Endpoint: ${AzureSearch__Endpoint:-}
  #     AzureSearch__ApiKey: ${AzureSearch__ApiKey:-}
  #     AzureSearch__IndexName: ${AzureSearch__IndexName:-documents}

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      azurite:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__DefaultConnection: ${ConnectionStrings__DefaultConnection:-Host=postgres;Port=5432;Database=document_intelligence;Username=postgres;Password=postgres}
      # AzureStorage:* — read by AzureBlobFileStorage / BlobStorageOptions.
      # The Azurite dev connection string below wires the API to the local emulator container.
      # For production, replace with the real Azure Blob Storage connection string via secrets.
      AzureStorage__ConnectionString: ${AzureStorage__ConnectionString:-DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;}
      AzureStorage__ContainerName: ${AzureStorage__ContainerName:-documents}
      AzureOpenAI__Endpoint: ${AzureOpenAI__Endpoint:-}
      AzureOpenAI__ApiKey: ${AzureOpenAI__ApiKey:-}
      AzureOpenAI__DeploymentName: ${AzureOpenAI__DeploymentName:-}
      AzureSearch__Endpoint: ${AzureSearch__Endpoint:-}
      AzureSearch__ApiKey: ${AzureSearch__ApiKey:-}
      AzureSearch__IndexName: ${AzureSearch__IndexName:-documents}
    ports:
      - "${API_HTTP_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./ui/AI.DocumentIntelligence.UI
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${FRONTEND_HTTP_PORT:-4200}:8080"

volumes:
  postgres-data:
  azurite-data:
