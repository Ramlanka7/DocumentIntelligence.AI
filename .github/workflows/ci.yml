# ---------------------------------------------------------------------------
# CI — Continuous Integration
#
# Triggers on every push/PR to main and dev, plus any task/** feature branch.
# Jobs run in parallel where possible:
#   backend  → restore / format-check / build / test / coverage gate
#   frontend → install / build / test (headless)
#   docker   → build both images (no push) + validate compose config
# ---------------------------------------------------------------------------
name: CI

on:
  push:
    branches: [main, dev, "task/**"]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.event.pull_request.head.repo.full_name || github.repository }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "10.0.x"
  NODE_VERSION: "22.x"
  REGISTRY: ghcr.io

jobs:
  # =========================================================================
  # Backend — .NET 10
  # =========================================================================
  backend:
    name: Backend (.NET 10)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # Restore is cached by the SDK action via NuGet package cache.
      - name: Restore packages
        run: dotnet restore

      # Fail on any known-vulnerable NuGet package (direct or transitive).
      - name: Dependency vulnerability scan (NuGet)
        run: |
          OUTPUT=$(dotnet list package --vulnerable --include-transitive 2>&1)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "has the following vulnerable packages"; then
            echo "FAIL: vulnerable NuGet package(s) detected."
            exit 1
          fi
          echo "PASS: no known-vulnerable NuGet packages."

      # EnforceCodeStyleInBuild + TreatWarningsAsErrors are on in Directory.Build.props.
      - name: Build (Release, zero-warning policy)
        run: dotnet build --no-restore --configuration Release

      # dotnet format --verify-no-changes exits non-zero if any file would change,
      # acting as a hard lint gate. Run after a successful build so formatting
      # violations are reported separately from compile errors.
      - name: Format / style check
        run: dotnet format --verify-no-changes

      # coverlet.collector is referenced by the test project; XPlat Code Coverage
      # produces Cobertura XML consumed by ReportGenerator in the next step.
      # coverlet.runsettings excludes EF migrations (generated schema code) so the
      # coverage number measures hand-written code only.
      - name: Run tests with coverage collection
        run: |
          dotnet test \
            --no-build \
            --configuration Release \
            --collect:"XPlat Code Coverage" \
            --settings coverlet.runsettings \
            --results-directory ./TestResults \
            --logger "trx;LogFileName=test-results.trx"
        env:
          # Integration tests use WebApplicationFactory; env vars replace user-secrets.
          Jwt__SecretKey: "CI_TestSecretKey_At_Least_32_Characters_Long"
          Jwt__Issuer: "DocumentIntelligence"
          Jwt__Audience: "DocumentIntelligenceClient"
          Jwt__AccessTokenExpiryMinutes: "60"
          Jwt__RefreshTokenExpiryDays: "7"
          AzureOpenAI__Endpoint: "https://stub.openai.azure.com/"
          AzureOpenAI__ApiKey: "stub-api-key"
          AzureSearch__Endpoint: "https://stub.search.windows.net"
          AzureSearch__ApiKey: "stub-search-key"
          ApplicationInsights__ConnectionString: ""
          ConnectionStrings__DefaultConnection: ""
          Anthropic__ApiKey: "stub-anthropic-key"
          OpenAI__ApiKey: "stub-openai-key"
          Ollama__BaseUrl: "http://localhost:11434"
          AzureStorage__ConnectionString: "UseDevelopmentStorage=true"
          AzureStorage__ContainerName: "test-docs"

      # ReportGenerator turns the XPlat collector's Cobertura XML into a readable
      # text summary and enforces the minimum line-coverage gate.
      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate coverage summary
        run: |
          reportgenerator \
            "-reports:**/TestResults/**/coverage.cobertura.xml" \
            "-targetdir:CoverageReport" \
            "-reporttypes:TextSummary;Cobertura"
          echo "---- Coverage Summary ----"
          cat CoverageReport/Summary.txt

      # Fail the build if line coverage is below 60 % (currently ~72 % with generated
      # code excluded). Raise incrementally as coverage improves; never lower it.
      - name: Coverage gate (>= 60 % line coverage)
        run: |
          COVERAGE=$(grep -oP '(?<=Line coverage: )\d+(\.\d+)?(?=%)' CoverageReport/Summary.txt || echo "0")
          echo "Measured line coverage: ${COVERAGE}%"
          if awk "BEGIN {exit !($COVERAGE < 60)}"; then
            echo "FAIL: coverage ${COVERAGE}% is below the 60% threshold."
            exit 1
          fi
          echo "PASS: coverage ${COVERAGE}% meets the minimum threshold."

      - name: Upload test results + coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: |
            TestResults/
            CoverageReport/

  # =========================================================================
  # Frontend — Angular 20
  # =========================================================================
  frontend:
    name: Frontend (Angular 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui/AI.DocumentIntelligence.UI

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ui/AI.DocumentIntelligence.UI/package-lock.json

      # npm ci is reproducible (respects package-lock.json exactly).
      - name: Install dependencies
        run: npm ci

      # Fail on high/critical advisories in production dependencies.
      # Dev-only tooling advisories are surfaced but not blocking.
      - name: Dependency vulnerability scan (npm)
        run: npm audit --omit=dev --audit-level=high

      # Production build validates AOT compilation, budgets, and tree-shaking.
      - name: Build (production)
        run: npm run build -- --configuration production

      # Karma / ChromeHeadless.  On ubuntu-latest Google Chrome is pre-installed;
      # no extra setup needed.
      - name: Run tests (headless Chrome)
        run: npm test -- --watch=false --browsers=ChromeHeadless

  # =========================================================================
  # Secret scanning — full git history
  # =========================================================================
  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history for historical leak detection)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # =========================================================================
  # Docker build + compose config validation
  # Runs only after backend and frontend are green to save build minutes.
  # =========================================================================
  docker-validate:
    name: Docker Build & Compose Validation
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # BuildKit via buildx is required for multi-stage cache-from/to.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build but do not push — validates the Dockerfile and all COPY paths.
      # load: true keeps the image in the local daemon so Trivy can scan it below.
      - name: Build API image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: ${{ env.REGISTRY }}/ai-document-intelligence-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Fail the pipeline on HIGH/CRITICAL vulnerabilities with an available fix.
      - name: Scan API image (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/ai-document-intelligence-api:ci
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"


      - name: Build frontend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./ui/AI.DocumentIntelligence.UI
          file: ./ui/AI.DocumentIntelligence.UI/Dockerfile
          push: false
          tags: ${{ env.REGISTRY }}/ai-document-intelligence-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Validate both compose files parse cleanly.
      # cp .env.example .env so compose has values for all ${VAR:-} expansions.
      - name: Validate docker-compose.yml
        run: |
          cp .env.example .env
          echo "Jwt__SecretKey=CI_ValidKey_32CharactersMinimumForHS256" >> .env
          docker compose config > /dev/null
          echo "docker-compose.yml is valid."

      - name: Validate docker-compose.prod.yml overlay
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.prod.yml \
            config > /dev/null
          echo "docker-compose.prod.yml overlay is valid."
