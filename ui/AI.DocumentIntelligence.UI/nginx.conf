server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ---- Compression -------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        font/woff2;

    # ---- Security response headers (see the include for the inheritance rule)
    include /etc/nginx/snippets/security-headers.conf;

    # ---- SPA shell ----------------------------------------------------------
    # index.html: no-cache so browsers always fetch the latest shell after a
    # deployment (hashed assets below handle actual content freshness).
    # This location declares add_header, so the security headers MUST be
    # re-included here (nginx drops inherited headers otherwise).
    location = /index.html {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires 0;
        try_files $uri =404;
    }

    # ---- SPA routing --------------------------------------------------------
    # All non-file requests fall through to index.html so Angular's router
    # handles deep links without returning 404 from nginx.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- Hashed static assets (Angular output-hashing=all) -----------------
    # Angular appends a content hash to JS/CSS/font filenames in production,
    # so these files are safe to cache for 1 year. Security headers re-included
    # because Cache-Control is declared here.
    location ~* \.(js|css|woff2?|ttf|svg|ico|png|jpg|jpeg|webp|avif)$ {
        include /etc/nginx/snippets/security-headers.conf;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # ---- Health probe (used by Docker HEALTHCHECK + load balancer) ---------
    location /health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }
}
