server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ---- Compression -------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        font/woff2;

    # ---- Security response headers -----------------------------------------
    # Content-Security-Policy is intentionally permissive here to allow the
    # Angular app to call the API on the same host (or a configured API origin).
    # Tighten in production by replacing 'unsafe-inline' with nonces or hashes.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self';"
        always;

    # ---- SPA routing -------------------------------------------------------
    # All non-file requests fall through to index.html so Angular's router
    # handles deep links without returning 404 from nginx.
    # index.html: no-cache so browsers always fetch the latest shell after
    # a deployment (hashed assets below handle the actual content freshness).
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires 0;
        try_files $uri =404;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # Allow Google Fonts (loaded in index.html) and same-origin API calls.
    # 'unsafe-inline' is required for Angular Material component styles injected at runtime.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; img-src 'self' data:; frame-ancestors 'none'" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- Hashed static assets (Angular output-hashing=all) -----------------
    # Angular appends a content hash to JS/CSS/font filenames in production,
    # so these files are safe to cache for 1 year.
    location ~* \.(js|css|woff2?|ttf|svg|ico|png|jpg|jpeg|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # ---- Health probe (used by Docker HEALTHCHECK + load balancer) ---------
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
