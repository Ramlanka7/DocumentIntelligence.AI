# ---------------------------------------------------------------------------
# Shared security response headers.
#
# nginx `add_header` inheritance rule: a location that declares ANY add_header
# of its own drops ALL headers inherited from the server block. Every location
# that sets its own headers (caching, content-type, ...) must therefore
# `include` this file again — never rely on inheritance.
# ---------------------------------------------------------------------------
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
# 'unsafe-inline' for styles is required by Angular Material's runtime-injected
# component styles; scripts are strictly self-only. Google Fonts is loaded in
# index.html. frame-ancestors 'none' mirrors X-Frame-Options DENY for
# CSP-aware browsers.
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; img-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
