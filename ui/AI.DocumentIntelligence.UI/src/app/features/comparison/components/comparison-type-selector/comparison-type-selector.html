<fieldset class="type-selector" aria-label="Comparison type">
  <legend class="type-selector__legend">Select Comparison Type</legend>

  <div class="type-selector__grid" role="radiogroup" aria-label="Comparison type options">
    @for (option of options; track option.value) {
      <button
        class="type-card"
        [class.type-card--selected]="isSelected(option.value)"
        type="button"
        role="radio"
        [attr.aria-checked]="isSelected(option.value)"
        [attr.aria-label]="option.label + ': ' + option.description"
        (click)="select(option.value)"
        (keydown.enter)="select(option.value)"
        (keydown.space)="select(option.value)"
      >
        <mat-icon class="type-card__icon" aria-hidden="true">{{ option.icon }}</mat-icon>
        <div class="type-card__content">
          <span class="type-card__label">{{ option.label }}</span>
          <span class="type-card__description">{{ option.description }}</span>
        </div>
        @if (isSelected(option.value)) {
          <mat-icon class="type-card__check" aria-hidden="true">check_circle</mat-icon>
        }
      </button>
    }
  </div>
</fieldset>
