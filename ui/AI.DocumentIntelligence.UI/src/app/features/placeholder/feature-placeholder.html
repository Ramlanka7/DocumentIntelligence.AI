<section class="placeholder" role="status">
  <mat-card class="placeholder__card" appearance="outlined">
    <mat-card-content>
      <mat-icon class="placeholder__icon" aria-hidden="true">{{ icon() }}</mat-icon>
      <h2 class="placeholder__title">{{ title() }}</h2>
      <p class="placeholder__description">{{ description() }}</p>
    </mat-card-content>
  </mat-card>
</section>
